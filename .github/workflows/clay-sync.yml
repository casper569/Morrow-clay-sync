name: Clay sync
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run clay-sync
        run: node clay-sync.js
        env:
          LEMLIST_API_KEY: ${{ secrets.LEMLIST_API_KEY }}
          CLAY_WEBHOOK_URL: ${{ secrets.CLAY_WEBHOOK_URL }}
      - name: Persist ledger
        run: |
          git config user.name "clay-sync-bot"
          git config user.email "bot@users.noreply.github.com"
          git add clay-sent-ids.json || true
          git commit -m "update ledger [skip ci]" || echo "niks te committen"
          git push || echo "geen push nodig"
