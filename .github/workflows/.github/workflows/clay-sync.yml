name: Clay sync (Lemlist CC + LinkedIn replies)

on:
  schedule:
    - cron: '0 6 * * *'          # elke dag 06:00 UTC ≈ 08:00 Amsterdam
  workflow_dispatch: {}           # knop om 'm handmatig te testen

permissions:
  contents: write                 # nodig om het geheugenbestand terug te committen

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Run clay-sync
        run: node clay-sync.js
        env:
          LEMLIST_API_KEY: ${{ secrets.LEMLIST_API_KEY }}
          CLAY_WEBHOOK_URL: ${{ secrets.CLAY_WEBHOOK_URL }}
          # MODE: gap (standaard) = alleen CC + LinkedIn die de webhook mist

      - name: Geheugenbestand bewaren (voorkomt dubbelingen)
        run: |
          if [ -n "$(git status --porcelain clay-sent-ids.json)" ]; then
            git config user.name "clay-sync-bot"
            git config user.email "clay-sync-bot@users.noreply.github.com"
            git add clay-sent-ids.json
            git commit -m "update ledger [skip ci]"
            git push
          else
            echo "Niets nieuws — geheugenbestand ongewijzigd."
          fi
